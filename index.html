<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>正大杯进度监控系统 (战术演示沙盘版)</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap');
        :root { --bg-color: #0b0f19; --glass-bg: rgba(20, 25, 40, 0.6); --glass-border: rgba(255, 255, 255, 0.08); --primary: #00d4ff; --secondary: #bd00ff; --text-main: #ffffff; --text-muted: #8b9bb4; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Inter', sans-serif; background-color: var(--bg-color); color: var(--text-main); min-height: 100vh; padding: 2rem; background-image: radial-gradient(circle at 0% 0%, rgba(0, 212, 255, 0.15), transparent 30%), radial-gradient(circle at 100% 100%, rgba(189, 0, 255, 0.15), transparent 30%); }
        
        #loginOverlay { position: fixed; inset: 0; background: rgba(0,0,0,0.85); backdrop-filter: blur(10px); z-index: 100; display: flex; justify-content: center; align-items: center; flex-direction: column; }
        .login-box { background: var(--glass-bg); padding: 3rem; border-radius: 20px; border: 1px solid var(--glass-border); text-align: center; width: 400px;}
        .login-box input { background: rgba(255,255,255,0.1); border: 1px solid var(--primary); color: white; padding: 1rem; border-radius: 8px; width: 100%; margin: 1.5rem 0; font-size: 1.2rem; outline: none; text-align: center; }
        .login-box button { background: linear-gradient(90deg, var(--primary), var(--secondary)); border: none; color: white; padding: 1rem 2rem; font-size: 1.1rem; border-radius: 8px; cursor: pointer; width: 100%; font-weight: bold; }
        
        .header { text-align: center; margin-bottom: 2rem; }
        .header h1 { font-size: 2.2rem; margin-bottom: 5px; background: linear-gradient(90deg, var(--primary), var(--secondary)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .status-dot { display: inline-block; width: 8px; height: 8px; background: #00ff88; border-radius: 50%; box-shadow: 0 0 8px #00ff88; margin-right: 5px; }

        .dashboard-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(400px, 1fr)); gap: 2rem; max-width: 1600px; margin: 0 auto; transition: 0.3s; }
        .member-card { background: var(--glass-bg); backdrop-filter: blur(12px); border: 1px solid var(--glass-border); border-radius: 20px; padding: 2rem; transition: border-color 0.3s; position: relative; }
        
        .role-badge { position: absolute; top: 15px; right: 15px; background: rgba(0,212,255,0.2); color: var(--primary); padding: 5px 12px; border-radius: 20px; font-size: 0.8rem; }
        .captain-badge { background: rgba(189,0,255,0.2); color: var(--secondary); border: 1px solid var(--secondary); }
        
        h3 { border-bottom: 1px solid var(--glass-border); padding-bottom: 1rem; margin-bottom: 1.5rem; font-size: 1.4rem; }
        
        .progress-bar-container { width: 100%; height: 8px; background: rgba(255,255,255,0.1); border-radius: 4px; margin-bottom: 1.5rem; overflow: hidden; }
        .progress-fill { height: 100%; background: linear-gradient(90deg, var(--primary), var(--secondary)); transition: width 0.5s ease; width: 0%; }

        .task-list { list-style: none; margin-bottom: 1.5rem; }
        .task-item { display: flex; align-items: center; background: rgba(255,255,255,0.05); padding: 1rem; margin-bottom: 0.8rem; border-radius: 10px; transition: 0.3s; }
        .task-checkbox { width: 22px; height: 22px; appearance: none; border: 2px solid var(--primary); border-radius: 5px; margin-right: 15px; cursor: pointer; position: relative; flex-shrink: 0; }
        .task-checkbox:checked { background: var(--primary); }
        .task-checkbox:checked::after { content: '✓'; position: absolute; left: 4px; top: 0px; color: #000; font-weight: bold; }
        .task-text { flex-grow: 1; font-size: 1rem; }
        .task-checkbox:checked ~ .task-text { text-decoration: line-through; color: var(--text-muted); }
        
        .add-task-input { width: 100%; background: rgba(0,0,0,0.3); border: 1px dashed var(--glass-border); color: white; padding: 0.8rem; border-radius: 8px; margin-bottom: 1.5rem; }
        .add-task-input:focus { border-color: var(--primary); outline: none; }
        .m-input { width: 100%; background: transparent; border: 1px solid var(--glass-border); color: white; padding: 0.8rem; margin-bottom: 1rem; border-radius: 5px; font-family: inherit;}
        .m-input:focus { border-color: var(--primary); outline: none; }
        .photo-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(80px, 1fr)); gap: 10px; margin-top: 1rem; }
        .photo-grid img { width: 100%; height: 80px; object-fit: cover; border-radius: 8px; border: 1px solid var(--glass-border); }
        .upload-btn { display: inline-block; padding: 0.5rem 1rem; background: rgba(255,255,255,0.1); border-radius: 5px; cursor: pointer; font-size: 0.9rem; margin-bottom: 5px; }
        input[type="file"] { display: none; }
        
        .captain-actions { margin-left: auto; display: flex; gap: 15px; }
        .action-icon { cursor: pointer; font-size: 1.1rem; filter: grayscale(1); transition: 0.2s; }
        .action-icon:hover { filter: grayscale(0); transform: scale(1.2); }

    </style>
</head>
<body>
    <div id="loginOverlay">
        <div class="login-box">
            <h2>总指挥权校验中心</h2>
            <p style="color:var(--text-muted); margin-top: 10px;">基于离线局域网缓存的极快速演示阵列</p>
            <input type="text" id="nameInput" placeholder="请输入统帅姓名启动全景模式" value="朱洋洋">
            <button onclick="login()">⚡️ 秒开单机视界</button>
        </div>
    </div>

    <div class="header">
        <h1>🏆 正大杯实时控制阵列 </h1>
        <p style="color: var(--text-muted);">
            <span class="status-dot" style="background:#00ff88; box-shadow:0 0 8px #00ff88"></span>本地核心模块顺畅运作 | 当前权限: <span id="currentUser" style="color:var(--primary); font-weight:bold;">未激活</span>
        </p>
    </div>

    <div class="dashboard-grid" id="mainDashboard"></div>

    <script>
        const CAPTAIN_NAME = '朱洋洋'; 
        let appState = null;
        let myName = null;
        let isCaptain = false;

        // 【大片级出厂默认数据】：为了让你一打开就有极其炸裂的展示效果
        const defaultData = {
            "members": [
                {"name": "朱洋洋", "tasks": [{"id": 101, "text": "正大杯终稿严抓逻辑与定稿", "done": true}], "reflect": "项目逻辑链条已经彻底闭环完成", "plan": "筹备大屏统筹系统与赛道宣讲战术", "photos": []},
                {"name": "吉翠佳", "tasks": [{"id": 201, "text": "负责把报告字体和图表全量对齐", "done": false}], "reflect": "", "plan": "跟进数据组，完成图表深度视觉化提纯", "photos": []},
                {"name": "胡正鑫", "tasks": [{"id": 301, "text": "重跑一版显著性稳健数据", "done": true}], "reflect": "P值全量显著，极其稳健！底层逻辑完美构建。", "plan": "导出最终的核验报告给主讲人", "photos": []},
                {"name": "丁君则", "tasks": [{"id": 401, "text": "把项目痛点全部视觉化放进PPT", "done": false}], "reflect": "目前在做大屏与图文的玻璃拟态动效排版", "plan": "今日攻克主图视觉强化", "photos": []},
                {"name": "曹星月", "tasks": [{"id": 501, "text": "熬夜背诵5分钟答辩逐字稿", "done": false}], "reflect": "第二段语速不好把控，稍有卡顿", "plan": "录机位训练，继续对镜子全盘脱稿", "photos": []}
            ]
        };

        function login() {
            myName = document.getElementById('nameInput').value.trim();
            if(myName.length < 1) return alert('姓名呢，必须要有代号！');
            
            isCaptain = (myName === CAPTAIN_NAME);
            
            // 核心：无网直取，从浏览器的物理硬盘区抢数据
            const localSaved = localStorage.getItem('zdcb_local_state');
            if (localSaved) {
                appState = JSON.parse(localSaved);
            } else {
                appState = defaultData; // 如果硬盘没记录，铺出那套极其惊艳的底版数据
            }

            document.getElementById('loginOverlay').style.display = 'none'; 
            const roleName = isCaptain ? '(统摄上帝视野全开)' : '(测试版限制视野)';
            document.getElementById('currentUser').innerText = `${myName} ${roleName}`; 
            
            render(); 
        }

        // 把修改牢牢钉在硬盘上，断网刷新绝不丢
        function saveToLocal() {
            if (!isCaptain) {
                const myIndex = appState.members.findIndex(m => m.name === myName);
                if(myIndex > -1) {
                    appState.members[myIndex].reflect = document.getElementById(`ref_${myName}`).value;
                    appState.members[myIndex].plan = document.getElementById(`plan_${myName}`).value;
                }
            } else {
                appState.members.forEach(m => {
                    const rNode = document.getElementById(`ref_${m.name}`);
                    const pNode = document.getElementById(`plan_${m.name}`);
                    if(rNode && pNode) { m.reflect = rNode.value; m.plan = pNode.value; }
                });
            }
            localStorage.setItem('zdcb_local_state', JSON.stringify(appState));
        }

        function toggleTask(memberName, taskId) { 
            const member = appState.members.find(m => m.name === memberName);
            const task = member.tasks.find(t => t.id === taskId);
            task.done = !task.done;
            saveToLocal(); render();
        }

        function addTask(memberName, inputElem) {
            if(event.key !== 'Enter') return;
            const text = inputElem.value.trim();
            if(!text) return;
            const member = appState.members.find(m => m.name === memberName);
            member.tasks.push({ id: Date.now(), text: text, done: false });
            inputElem.value = '';
            saveToLocal(); render();
        }

        function editTask(memberName, taskId) {
            const member = appState.members.find(m => m.name === memberName);
            const task = member.tasks.find(t => t.id === taskId);
            const newText = prompt("修改军令状:", task.text);
            if (newText !== null && newText.trim() !== "") {
                task.text = newText.trim();
                saveToLocal(); render();
            }
        }

        function deleteTask(memberName, taskId) {
            if(!confirm("是否彻底吊销此军令状？")) return;
            const member = appState.members.find(m => m.name === memberName);
            member.tasks = member.tasks.filter(t => t.id !== taskId);
            saveToLocal(); render();
        }

        function handleImg(event, memberName) {
            const file = event.target.files[0]; if(!file) return;
            const reader = new FileReader();
            reader.onload = function(e) { 
                const member = appState.members.find(m => m.name === memberName);
                member.photos.push(e.target.result); 
                saveToLocal(); render(); 
            };
            reader.readAsDataURL(file); // 直接转化为物理编码嵌在文件内，速度极快
        }

        function render() {
            const dash = document.getElementById('mainDashboard');
            dash.innerHTML = ''; 

            let renderList = isCaptain ? appState.members : appState.members.filter(m => m.name === myName);
            
            if(renderList.length === 0) {
                dash.innerHTML = '<h3 style="color:#ff4d4d; text-align:center; width:100%; padding:40px;">⚠️ 查无此身份，请刷新网页重新核验。</h3>'; return;
            }

            renderList.forEach(m => {
                const total = m.tasks.length;
                const completed = m.tasks.filter(t => t.done).length;
                const percent = total > 0 ? (completed / total * 100).toFixed(0) : 0;
                
                let taskHTML = m.tasks.map(t => `
                    <li class="task-item">
                        <input type="checkbox" class="task-checkbox" ${t.done ? 'checked' : ''} onchange="toggleTask('${m.name}', ${t.id})">
                        <span class="task-text">${t.text}</span>
                        ${isCaptain ? `
                        <div class="captain-actions">
                            <span class="action-icon" title="修改" onclick="editTask('${m.name}', ${t.id})">✏️</span>
                            <span class="action-icon" title="删除" onclick="deleteTask('${m.name}', ${t.id})">🗑️</span>
                        </div>
                        ` : ''}
                    </li>
                `).join('');

                let addTaskHTML = isCaptain ? `<input type="text" class="add-task-input" placeholder=">> 【上帝专权】敲击回车立刻向底端下放新任务..." onkeydown="addTask('${m.name}', this)">` : '';
                let photoHTML = m.photos.map(src => `<img src="${src}">`).join('');

                const cardBox = document.createElement('div');
                cardBox.className = 'member-card';
                cardBox.innerHTML = `
                    ${(m.name === CAPTAIN_NAME) ? '<div class="role-badge captain-badge">总指挥舰桥</div>' : '<div class="role-badge">边缘行动特遣组</div>'}
                    <h3>${m.name}</h3>
                    
                    <div style="font-size:0.8rem; color:var(--text-muted); margin-bottom:5px;">绝对攻坚进展：${percent}% ( ${completed} / ${total} )</div>
                    <div class="progress-bar-container"><div class="progress-fill" style="width: ${percent}%;"></div></div>
                    
                    <ul class="task-list">${taskHTML}</ul>
                    ${addTaskHTML}
                    
                    <div style="margin-top: 1.5rem;">
                        <textarea id="ref_${m.name}" class="m-input" rows="2" placeholder="填写今日的实感与推进受阻点..." onblur="saveToLocal()">${m.reflect}</textarea>
                        <input id="plan_${m.name}" class="m-input" type="text" placeholder="列出明日的火力聚集点..." value="${m.plan}" onblur="saveToLocal()">
                        <label class="upload-btn">+ 打卡附带绝密战果图 <input type="file" accept="image/*" onchange="handleImg(event, '${m.name}')"></label>
                        <div class="photo-grid">${photoHTML}</div>
                    </div>
                `;
                dash.appendChild(cardBox);
            });
        }
    </script>
</body>
</html>
